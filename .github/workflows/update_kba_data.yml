name: Jährliches KBA-Daten-Update

on:
  schedule:
    - cron: '0 6 1 5 *'   # 1. Mai, 06:00 UTC (KBA veröffentlicht neue Daten ca. April/Mai)
  workflow_dispatch:        # manuell auslösbar über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Dependencies installieren
        run: uv sync

      - name: KBA-Daten aktualisieren
        run: uv run python scripts/update_kba_data.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_data/03_computed_data/kba_ev_bestand.parquet
          git diff --staged --quiet || git commit -m "chore: jährliches KBA EV-Bestand Update $(date +%Y)"
          git push
