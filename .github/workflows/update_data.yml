name: Monatliches Daten-Update

on:
  schedule:
    - cron: '0 6 1 * *'   # 1. des Monats, 06:00 UTC
  workflow_dispatch:        # manuell auslösbar über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Dependencies installieren
        run: uv sync

      - name: Daten aktualisieren
        run: uv run python scripts/update_data.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_data/03_computed_data/combined_ladestation_ladepunkt.parquet
          git diff --staged --quiet || git commit -m "chore: monatliches Daten-Update $(date +%Y-%m)"
          git push
