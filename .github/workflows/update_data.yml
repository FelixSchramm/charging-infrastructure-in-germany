name: Monatliches Daten-Update

on:
  schedule:
    - cron: '0 6 5 * *'   # 5. des Monats, 06:00 UTC (BNetzA publiziert ~Anfang des Monats)
  workflow_dispatch:        # manuell auslösbar über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Dependencies installieren
        run: uv sync

      - name: Daten aktualisieren
        run: uv run python scripts/update_data.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_data/03_computed_data/combined_ladestation_ladepunkt.parquet 01_app/_data_version.py
          DATENSTAND=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' 01_app/_data_version.py || date +%Y-%m)
          git diff --staged --quiet || git commit -m "chore: Daten-Update Datenstand $DATENSTAND"
          git pull --rebase origin main
          git push
